services:
  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - API_TARGET=http://backend:5000
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: python:3.11
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && flask --app 'app:create_app()' run --host 0.0.0.0 --debug"
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cup_campaign_db}
    volumes:
      - ./infra/postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network


  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "minio:9000" # 這裡指向你的 MinIO 服務名稱與埠號
    ports:
      - "4040:4040" # ngrok 本地控制台
    networks:
      - app-network

      
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./infra/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app-network

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - app-network

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      - NGROK_AUTHTOKEN=36V1eixHkhCyCZUh3sJDZm0OXBt_a54BsBmmsncGqAstWxHj
    command:
      - "http"
      - "minio:9000"
    ports:
      - "4040:4040"
    networks:
      - app-network

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./crawler:/app
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
